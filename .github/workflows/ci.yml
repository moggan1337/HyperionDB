name: CI

on:
  push:
    branches: [main master develop]
  pull_request:
    branches: [main master develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        continue-on-error: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
        continue-on-error: true
      - run: pip install -e .
        continue-on-error: true
      - run: pip install pytest
        continue-on-error: true
      - run: pytest
        continue-on-error: true
